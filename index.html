<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>index</title>
    <link rel="stylesheet" href="./assets/css/auth.css">
</head>
<body>
    <div class="container__login">
        <div class="container__login--head">
            <div class="container__login--head-logo">
                <h1>TASKER</h1>
            </div>
            <div class="container__login--head-label">
                <h2>Welcome to Tasker !</h2>
                <p>Please sign-in to your account and start the adventure</p>
            </div>
        </div>
        <div class="container__login--content">
            <div class="container__login--content-input">
                <label for="input_username">Username</label>
                <input type="text"placeholder="Enter your username"id="input_username"required>
            </div>
            <div class="container__login--content-input">
                <label for="input_password">Password</label>
                <input type="password"placeholder="**********"id="input_password"required>
            </div>
            <div class="container__login--content-btn">
                <button type="submit">Sign In</button>
            </div>
            <div class="container__login--content-links">
                <p>New on our plateform ? Please <a href="#">Sign Up</a></p>
                <a href="#">Forgot your password ?</a>
            </div>
        </div>
    </div>
</body>
</html>
